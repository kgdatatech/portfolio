<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0d0f1a"/>
  <rect width="800" height="450" fill="url(#bg-grad)" opacity="0.8"/>

  <!-- Pipeline / workflow nodes -->
  <!-- Step 1 -->
  <circle cx="120" cy="240" r="36" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="235" text-anchor="middle" fill="#f59e0b" font-size="18">📋</text>
  <text x="120" y="252" text-anchor="middle" fill="#fde68a" font-size="10" font-family="Arial" font-weight="bold">ORDERS</text>
  <!-- Arrow -->
  <line x1="158" y1="240" x2="204" y2="240" stroke="#334155" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="204,235 214,240 204,245" fill="#334155"/>
  <!-- Step 2 -->
  <circle cx="250" cy="240" r="36" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="235" text-anchor="middle" fill="#3b82f6" font-size="18">⚙️</text>
  <text x="250" y="252" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="Arial" font-weight="bold">WORKFLOW</text>
  <!-- Arrow -->
  <line x1="288" y1="240" x2="334" y2="240" stroke="#334155" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="334,235 344,240 334,245" fill="#334155"/>
  <!-- Step 3 -->
  <circle cx="380" cy="240" r="36" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="380" y="235" text-anchor="middle" fill="#22c55e" font-size="18">🚚</text>
  <text x="380" y="252" text-anchor="middle" fill="#86efac" font-size="10" font-family="Arial" font-weight="bold">DELIVERY</text>

  <!-- Team alignment panel -->
  <rect x="450" y="160" width="300" height="220" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="466" y="185" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">TEAM ALIGNMENT STATUS</text>
  <line x1="466" y1="192" x2="735" y2="192" stroke="#1e293b" stroke-width="1"/>

  <!-- Team rows -->
  <text x="466" y="215" fill="#e2e8f0" font-size="11" font-family="Arial">Installation</text>
  <rect x="560" y="203" width="160" height="14" rx="7" fill="#1e293b"/>
  <rect x="560" y="203" width="148" height="14" rx="7" fill="#22c55e" opacity="0.8"/>
  <text x="724" y="215" fill="#86efac" font-size="10" font-family="Arial">93%</text>

  <text x="466" y="240" fill="#e2e8f0" font-size="11" font-family="Arial">Warehouse</text>
  <rect x="560" y="228" width="160" height="14" rx="7" fill="#1e293b"/>
  <rect x="560" y="228" width="120" height="14" rx="7" fill="#3b82f6" opacity="0.8"/>
  <text x="724" y="240" fill="#93c5fd" font-size="10" font-family="Arial">75%</text>

  <text x="466" y="265" fill="#e2e8f0" font-size="11" font-family="Arial">Scheduling</text>
  <rect x="560" y="253" width="160" height="14" rx="7" fill="#1e293b"/>
  <rect x="560" y="253" width="155" height="14" rx="7" fill="#a855f7" opacity="0.8"/>
  <text x="724" y="265" fill="#d8b4fe" font-size="10" font-family="Arial">97%</text>

  <text x="466" y="290" fill="#e2e8f0" font-size="11" font-family="Arial">Quality</text>
  <rect x="560" y="278" width="160" height="14" rx="7" fill="#1e293b"/>
  <rect x="560" y="278" width="96" height="14" rx="7" fill="#f59e0b" opacity="0.8"/>
  <text x="724" y="290" fill="#fde68a" font-size="10" font-family="Arial">60%</text>

  <text x="466" y="315" fill="#e2e8f0" font-size="11" font-family="Arial">Delivery</text>
  <rect x="560" y="303" width="160" height="14" rx="7" fill="#1e293b"/>
  <rect x="560" y="303" width="140" height="14" rx="7" fill="#22c55e" opacity="0.8"/>
  <text x="724" y="315" fill="#86efac" font-size="10" font-family="Arial">88%</text>

  <line x1="466" y1="328" x2="735" y2="328" stroke="#1e293b" stroke-width="1"/>
  <text x="466" y="346" fill="#64748b" font-size="10" font-family="Arial">Part Orders · Workflow Tools · Account Settings</text>
  <text x="466" y="362" fill="#64748b" font-size="10" font-family="Arial">California Closets · Internal Platform</text>

  <!-- Title -->
  <rect x="50" y="33" width="3" height="32" rx="1.5" fill="#f59e0b"/>
  <text x="64" y="52" fill="#f59e0b" font-size="13" font-family="Arial" font-weight="bold" letter-spacing="3">FINAL MILE</text>
  <text x="64" y="82" fill="white" font-size="26" font-family="Arial" font-weight="bold">Delivery Workflow SaaS</text>
  <text x="64" y="108" fill="#94a3b8" font-size="14" font-family="Arial">Internal tool — California Closets · Full Stack Dev &amp; Business Analyst</text>

  <!-- Pills -->
  <rect x="64" y="124" width="120" height="26" rx="13" fill="#1c1917" stroke="#f59e0b" stroke-width="1"/>
  <text x="124" y="141" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial" font-weight="bold">Full Stack Dev</text>
  <rect x="194" y="124" width="130" height="26" rx="13" fill="#1c1917" stroke="#f59e0b" stroke-width="1"/>
  <text x="259" y="141" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial" font-weight="bold">Business Analyst</text>
  <rect x="334" y="124" width="110" height="26" rx="13" fill="#1c1917" stroke="#78350f" stroke-width="1"/>
  <text x="389" y="141" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial" font-weight="bold">Proprietary</text>

  <!-- Tech stack -->
  <rect x="64" y="390" width="75" height="24" rx="12" fill="#1c1917"/>
  <text x="101" y="406" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial">Next.js</text>
  <rect x="149" y="390" width="65" height="24" rx="12" fill="#1c1917"/>
  <text x="181" y="406" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial">Python</text>
  <rect x="224" y="390" width="50" height="24" rx="12" fill="#1c1917"/>
  <text x="249" y="406" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial">SQL</text>
  <rect x="284" y="390" width="95" height="24" rx="12" fill="#1c1917"/>
  <text x="331" y="406" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial">REST APIs</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
  </defs>
</svg>
