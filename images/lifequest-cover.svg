<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0a0f1e"/>
  <rect width="800" height="450" fill="url(#bg-grad)" opacity="0.8"/>

  <!-- Stars background -->
  <circle cx="120" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="80" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="500" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="650" cy="70" r="2" fill="white" opacity="0.5"/>
  <circle cx="720" cy="25" r="1" fill="white" opacity="0.4"/>
  <circle cx="760" cy="100" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="120" r="1" fill="white" opacity="0.5"/>
  <circle cx="680" cy="140" r="1" fill="white" opacity="0.3"/>

  <!-- XP progress bar -->
  <rect x="80" y="320" width="460" height="12" rx="6" fill="#1e1b4b"/>
  <rect x="80" y="320" width="320" height="12" rx="6" fill="url(#xp-grad)"/>
  <text x="80" y="310" fill="#a78bfa" font-size="12" font-family="Arial" font-weight="bold">XP  320 / 460</text>

  <!-- Stat bars -->
  <text x="80" y="356" fill="#94a3b8" font-size="11" font-family="Arial">FOCUS</text>
  <rect x="130" y="344" width="100" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="130" y="344" width="82" height="8" rx="4" fill="#8b5cf6"/>

  <text x="250" y="356" fill="#94a3b8" font-size="11" font-family="Arial">STREAK</text>
  <rect x="310" y="344" width="100" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="310" y="344" width="68" height="8" rx="4" fill="#f59e0b"/>

  <text x="430" y="356" fill="#94a3b8" font-size="11" font-family="Arial">HABITS</text>
  <rect x="487" y="344" width="80" height="8" rx="4" fill="#1e1b4b"/>
  <rect x="487" y="344" width="72" height="8" rx="4" fill="#22c55e"/>

  <!-- Quest log panel -->
  <rect x="520" y="200" width="220" height="160" rx="8" fill="#0f172a" stroke="#4c1d95" stroke-width="1.5" opacity="0.9"/>
  <text x="535" y="225" fill="#a78bfa" font-size="12" font-family="Arial" font-weight="bold">📜 ACTIVE QUESTS</text>
  <line x1="535" y1="232" x2="727" y2="232" stroke="#4c1d95" stroke-width="1"/>
  <text x="535" y="252" fill="#c4b5fd" font-size="11" font-family="Arial">✓ Complete workout routine</text>
  <text x="535" y="272" fill="#c4b5fd" font-size="11" font-family="Arial">◈ Read 20 pages today</text>
  <text x="535" y="292" fill="#94a3b8" font-size="11" font-family="Arial">○ Build side project</text>
  <text x="535" y="312" fill="#94a3b8" font-size="11" font-family="Arial">○ Meditate 10 mins</text>
  <text x="535" y="340" fill="#fbbf24" font-size="11" font-family="Arial">🏆 +250 XP earned today</text>

  <!-- Level badge -->
  <circle cx="160" cy="220" r="65" fill="url(#level-grad)" opacity="0.15"/>
  <circle cx="160" cy="220" r="60" fill="none" stroke="url(#level-stroke)" stroke-width="2"/>
  <text x="160" y="208" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial" letter-spacing="2">LEVEL</text>
  <text x="160" y="250" text-anchor="middle" fill="white" font-size="52" font-family="Arial" font-weight="bold">7</text>

  <!-- Sword icon (center-right area) -->
  <line x1="345" y1="130" x2="345" y2="290" stroke="url(#sword-blade)" stroke-width="6" stroke-linecap="round"/>
  <!-- Crossguard -->
  <rect x="320" y="250" width="50" height="8" rx="4" fill="#a78bfa"/>
  <!-- Grip -->
  <rect x="342" y="258" width="7" height="22" rx="3" fill="#7c3aed"/>
  <!-- Pommel -->
  <circle cx="345" cy="285" r="6" fill="#a78bfa"/>
  <!-- Sparkle -->
  <path d="M370 120 L373 130 L383 130 L375 136 L378 146 L370 140 L362 146 L365 136 L357 130 L367 130 Z" fill="#fbbf24" opacity="0.9"/>

  <!-- Title -->
  <text x="80" y="52" fill="#a78bfa" font-size="14" font-family="Arial" font-weight="bold" letter-spacing="3">LIFEQUEST</text>
  <text x="80" y="82" fill="white" font-size="28" font-family="Arial" font-weight="bold">Gamify Your Life</text>
  <text x="82" y="108" fill="#94a3b8" font-size="15" font-family="Arial">Turn habits &amp; goals into an RPG adventure</text>

  <!-- Accent line -->
  <rect x="80" y="36" width="3" height="30" rx="1.5" fill="#a78bfa"/>

  <!-- Tech stack pills -->
  <rect x="80" y="390" width="80" height="24" rx="12" fill="#1e1b4b"/>
  <text x="120" y="406" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial">Next.js 15</text>

  <rect x="170" y="390" width="100" height="24" rx="12" fill="#1e1b4b"/>
  <text x="220" y="406" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial">TypeScript</text>

  <rect x="280" y="390" width="90" height="24" rx="12" fill="#1e1b4b"/>
  <text x="325" y="406" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial">Tailwind CSS</text>

  <rect x="380" y="390" width="70" height="24" rx="12" fill="#1e1b4b"/>
  <text x="415" y="406" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial">Vercel</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="xp-grad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="level-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="level-stroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sword-blade" x1="345" y1="130" x2="345" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="40%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
