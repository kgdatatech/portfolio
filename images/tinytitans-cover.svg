<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0a1f0a"/>
  <rect width="800" height="450" fill="url(#bg-grad)" opacity="0.85"/>

  <!-- Field lines (soccer field suggestion) -->
  <ellipse cx="400" cy="460" rx="320" ry="120" stroke="#1a4a1a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="400" cy="460" rx="180" ry="70" stroke="#1a4a1a" stroke-width="1" fill="none" opacity="0.4"/>
  <line x1="400" y1="200" x2="400" y2="450" stroke="#1a4a1a" stroke-width="1" opacity="0.4"/>

  <!-- Soccer ball -->
  <circle cx="180" cy="240" r="55" fill="white" opacity="0.95"/>
  <circle cx="180" cy="240" r="55" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Pentagon patches -->
  <polygon points="180,200 195,212 189,230 171,230 165,212" fill="#111"/>
  <polygon points="219,218 228,235 214,248 200,242 199,224" fill="#111"/>
  <polygon points="218,263 205,274 190,267 190,250 205,243" fill="#111"/>
  <polygon points="155,264 143,253 147,237 163,231 172,244" fill="#111"/>
  <polygon points="141,219 147,203 164,200 170,215 158,226" fill="#111"/>

  <!-- Basketball -->
  <circle cx="620" cy="240" r="50" fill="#ea580c" opacity="0.95"/>
  <path d="M570 240 Q595 210 620 240 Q645 270 670 240" stroke="#7c2d12" stroke-width="2" fill="none"/>
  <path d="M620 190 Q650 215 620 240 Q590 265 620 290" stroke="#7c2d12" stroke-width="2" fill="none"/>
  <line x1="620" y1="190" x2="620" y2="290" stroke="#7c2d12" stroke-width="2"/>
  <line x1="570" y1="240" x2="670" y2="240" stroke="#7c2d12" stroke-width="2"/>

  <!-- Stars / kids energy -->
  <text x="310" y="200" font-size="22" opacity="0.8">⭐</text>
  <text x="440" y="160" font-size="16" opacity="0.6">✨</text>
  <text x="355" y="300" font-size="14" opacity="0.5">⭐</text>

  <!-- Revenue badge -->
  <rect x="290" y="340" width="220" height="44" rx="22" fill="#15803d" stroke="#22c55e" stroke-width="1.5" opacity="0.95"/>
  <text x="400" y="358" text-anchor="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">🚀 $60K+ REVENUE</text>
  <text x="400" y="375" text-anchor="middle" fill="#bbf7d0" font-size="11" font-family="Arial">First Year · Year Founded 2024</text>

  <!-- Title -->
  <rect x="78" y="33" width="3" height="32" rx="1.5" fill="#22c55e"/>
  <text x="92" y="52" fill="#22c55e" font-size="13" font-family="Arial" font-weight="bold" letter-spacing="3">TINY TITANS SPORTS</text>
  <text x="92" y="82" fill="white" font-size="26" font-family="Arial" font-weight="bold">Director of Technology</text>
  <text x="92" y="108" fill="#94a3b8" font-size="14" font-family="Arial">&amp; Full Stack Engineer · Youth Sports Startup</text>

  <!-- Role pills -->
  <rect x="92" y="124" width="140" height="26" rx="13" fill="#14532d"/>
  <text x="162" y="141" text-anchor="middle" fill="#86efac" font-size="11" font-family="Arial" font-weight="bold">Dir. of Technology</text>

  <rect x="242" y="124" width="130" height="26" rx="13" fill="#1e3a5f"/>
  <text x="307" y="141" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="Arial" font-weight="bold">Full Stack Engineer</text>

  <rect x="382" y="124" width="90" height="26" rx="13" fill="#4a1d96"/>
  <text x="427" y="141" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Arial" font-weight="bold">MLS GO Partner</text>

  <!-- Ages tag -->
  <text x="92" y="175" fill="#94a3b8" font-size="13" font-family="Arial">Soccer · Basketball · Ages 2–8 · Atlanta Area</text>

  <!-- Tech stack -->
  <rect x="92" y="390" width="75" height="24" rx="12" fill="#1a3020"/>
  <text x="129" y="406" text-anchor="middle" fill="#86efac" font-size="11" font-family="Arial">GoMotion</text>

  <rect x="177" y="390" width="70" height="24" rx="12" fill="#1a3020"/>
  <text x="212" y="406" text-anchor="middle" fill="#86efac" font-size="11" font-family="Arial">Web Dev</text>

  <rect x="257" y="390" width="70" height="24" rx="12" fill="#1a3020"/>
  <text x="292" y="406" text-anchor="middle" fill="#86efac" font-size="11" font-family="Arial">Ops &amp; Fin.</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0a1f0a"/>
    </linearGradient>
  </defs>
</svg>
