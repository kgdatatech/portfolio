<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0a1628"/>
  <rect width="800" height="450" fill="url(#bg-grad)" opacity="0.7"/>

  <!-- Grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>

  <!-- Bar chart bars -->
  <rect x="80" y="240" width="60" height="120" rx="4" fill="url(#bar1)" opacity="0.9"/>
  <rect x="170" y="180" width="60" height="180" rx="4" fill="url(#bar2)" opacity="0.9"/>
  <rect x="260" y="130" width="60" height="230" rx="4" fill="url(#bar3)" opacity="0.9"/>
  <rect x="350" y="200" width="60" height="160" rx="4" fill="url(#bar2)" opacity="0.7"/>
  <rect x="440" y="160" width="60" height="200" rx="4" fill="url(#bar1)" opacity="0.8"/>

  <!-- Shield icon -->
  <path d="M620 90 L700 115 L700 195 C700 240 660 270 620 285 C580 270 540 240 540 195 L540 115 Z" fill="url(#shield-grad)" opacity="0.9"/>
  <path d="M620 130 L668 150 L668 195 C668 222 648 240 620 250 C592 240 572 222 572 195 L572 150 Z" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Checkmark -->
  <path d="M596 190 L612 206 L648 170" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Risk percentage pills -->
  <rect x="540" y="300" width="120" height="30" rx="15" fill="#dc2626" opacity="0.85"/>
  <text x="600" y="320" text-anchor="middle" fill="white" font-size="13" font-family="Arial" font-weight="bold">87% EXIT RISK</text>

  <rect x="540" y="340" width="120" height="30" rx="15" fill="#f59e0b" opacity="0.85"/>
  <text x="600" y="360" text-anchor="middle" fill="white" font-size="13" font-family="Arial" font-weight="bold">42% EXIT RISK</text>

  <rect x="540" y="380" width="120" height="30" rx="15" fill="#22c55e" opacity="0.85"/>
  <text x="600" y="400" text-anchor="middle" fill="white" font-size="13" font-family="Arial" font-weight="bold">12% EXIT RISK</text>

  <!-- Title text -->
  <text x="80" y="52" fill="#22c55e" font-size="14" font-family="Arial" font-weight="bold" letter-spacing="3">CHURNSHIELD</text>
  <text x="80" y="80" fill="white" font-size="28" font-family="Arial" font-weight="bold">ML Customer Retention</text>
  <text x="82" y="105" fill="#94a3b8" font-size="15" font-family="Arial">Predict who's about to leave — before they do</text>

  <!-- Accent line -->
  <rect x="80" y="36" width="3" height="30" rx="1.5" fill="#22c55e"/>

  <!-- Accuracy badge -->
  <rect x="360" y="34" width="130" height="36" rx="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="425" y="57" text-anchor="middle" fill="#22c55e" font-size="13" font-family="Arial" font-weight="bold">✓ 91% Accuracy</text>

  <!-- Tech stack pills -->
  <rect x="80" y="390" width="70" height="24" rx="12" fill="#1e3a5f"/>
  <text x="115" y="406" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">Next.js</text>

  <rect x="160" y="390" width="70" height="24" rx="12" fill="#1e3a5f"/>
  <text x="195" y="406" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">FastAPI</text>

  <rect x="240" y="390" width="100" height="24" rx="12" fill="#1e3a5f"/>
  <text x="290" y="406" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">scikit-learn</text>

  <rect x="350" y="390" width="80" height="24" rx="12" fill="#1e3a5f"/>
  <text x="390" y="406" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">Railway</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="540" y1="90" x2="700" y2="285" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
</svg>
